<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
</head>

<body>

    <header>
        <h1>Poll Form</h1>
        <p>A BYU practice</p>
    </header>

    <main>
        <h2>User Form</h2>
        <form>
            <lable for="fullname">Full Name: </lable>
            <input type="text" id="fullname" name="fullname" required>
            <lable for="useremail">Email:</lable>
            <input type="email" id="useremail" name="useremail" required>

            <lable for="quantity">Select Quantity</lable>
            <select name="quantity" id="quantity">
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>
            <lable for="browser">What is your favorite internet browser</lable>
            <select id="browser" name="browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            <lable for="pet">Do you have a household pet?</lable>
            <input type="checkbox" id="pet" name="pet">
            <lable for="feedback">List the places you have lived:</lable>
            <textarea id="feedback" name="feedback" rows="4"
              placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 My Marcos Alas</p>
    </footer>

</body>

</html>
