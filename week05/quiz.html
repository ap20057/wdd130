<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <h1>&#9989; Basic HTML and CSS Quiz</h1>

    <form action="#" method="post">


        <div class="form-group">
            <label for="q1">1. What does HTML stand for?</label>
            <input type="text" id="q1" name="q1" required>
        </div>


        <div class="form-group">
            <label for="q2">2. Explain the difference between class and id in CSS.</label>
            <textarea id="q2" name="q2" rows="4" required></textarea>
        </div>


        <div class="form-group">
            <label for="q3">3. Which tag is used to link a CSS file?</label>
            <select id="q3" name="q3" required>
                <option value="" selected disabled>Choose One ...</option>
                <option value="link">&lt;link&gt;</option>
                <option value="style">&lt;style&gt;</option>
                <option value="script">&lt;script&gt;</option>
            </select>
        </div>


        <div class="form-group">
            <label for="q4">4. How many heading levels are there in HTML?</label>
            <input type="number" id="q4" name="q4" min="1" max="10" required>
        </div>

        <button type="submit">Submit Quiz</button>

    </form>

</body>

</html>
