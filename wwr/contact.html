<!-- Rafting Site Contact Us Page-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | El Salvador Is Pure Rafting</title>
    <meta name="description"
      content="Contact El Salvador Is Pure Rafting for reservations, questions, or trip planning. Reach out and start your rafting adventure today!">
    <meta name="author" content="Marcos Alas">
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>


    <header>
        <img src="images/rafting.jpg" alt="Rafting Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>


    <main>


        <section class="company-info">
            <h1>El Salvador Is Pure Rafting</h1>
            <p><strong>9QCR+342 El Salvador</strong></p>
            <p>Citala, Chalatenango</p>
            <p>+503 7090 2371</p>
            <p>purerafting@whitewater.com</p>
        </section>


        <section class="contact-layout">


            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13000.291381676903!2d-89.21862359731263!3d14.368847813491188!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f63a678bb082055%3A0xb7ac7207dbaf31b!2s9QCR%2B342%2C%20Citala!5e0!3m2!1ses!2ssv!4v1775548636584!5m2!1ses!2ssv"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>


            <form class="contact-form">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email"
                      required>
                </div>

                <fieldset class="form-group">
                    <legend><strong>Message Purpose</strong></legend>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here"
                      required></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit">Send Message</button>

            </form>
        </section>


        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/manager.jpeg" alt="Manager">
                    <figcaption>Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/supervisor.jpeg" alt="Supervisor">
                    <figcaption>Supervisor</figcaption>
                </figure>

                <figure>
                    <img src="images/operations.jpeg" alt="Operations Manager">
                    <figcaption>Operations</figcaption>
                </figure>

            </div>
        </section>

    </main>


    <footer>
        <p>&copy; 2026 | El Salvador is Pure Rafting | Marcos Alas</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube.svg" alt="YouTube Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
